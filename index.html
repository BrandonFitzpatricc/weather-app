<html lang="en"><head><meta charset="UTF-8"/><title>Weather</title><script defer="defer" src="main.js"></script></head><body><div id="main-content" class="main-content hidden"><button id="open-sidebar-btn" class="open-sidebar-btn"><img class="icon" src="16d4b28c963b8ecf2ef8.svg" alt="menu selection icon" width="65" height="65"/></button><div id="header" class="header"><div id="current-temp" class="temp current"></div><button id="temp-converter-btn" class="temp-converter-btn"></button><div id="location-name" class="location-name"></div><div class="temp-info"><div id="feel-like-temp" class="temp feel-like"></div><div id="high-temp" class="temp high"></div><div id="low-temp" class="temp low"></div></div><img id="weather-icon" class="icon weather" width="250" height="250"/></div><div id="hourly-weather-info" class="weather-info hourly"><button id="scroll-left-btn" class="scroll-btn left"><img class="icon" src="03333dd4f5bb0ce17f12.svg" alt="scroll-left-icon" width="50" height="50"/></button> <button id="scroll-right-btn" class="scroll-btn right"><img class="icon" src="2183cdfbbd589d48b0da.svg" alt="scroll-left-icon" width="50" height="50"/></button></div><div id="daily-weather-info" class="weather-info daily"></div></div><div id="locations-sidebar" class="locations-sidebar hidden"><div class="heading"><img class="icon" src="26c400cfe315a4d5f9e2.svg" alt="locations icon" width="65" height="65"/><div class="heading-text">Locations</div><button class="close-sidebar-btn"><img class="icon" src="10560b50fed481dfc10c.svg" alt="collapse sidebar icon" width="65" height="65"/></button></div><div id="new-location-tab" class="tab new-location"><button class="add-location-btn"><img class="icon" src="3cffe9a515498593b872.svg" alt="add icon" width="55" height="55"/><div class="btn-text">New Location</div></button></div></div><div id="new-location-prompt" class="new-location-prompt hidden"><form id="new-location-form" class="new-location-form"><div class="form-title">New Location</div><div class="form-field"><label for="city">City</label> <input id="city" required pattern="^[a-zA-Z\s]*$"/></div><div class="form-field"><label for="state">State</label> <input id="state" required pattern="^[a-zA-Z\s]*$"/></div><button class="enter-btn" type="submit">Enter</button><div id="error-message" class="error-message hidden">Location Not Found</div><button type="button" id="back-btn" class="back-btn"><img class="icon" src="e10837f7ea7913e09ef1.svg" alt="back icon"/></button><div class="loader hidden"></div></form></div><div id="loader" class="loader hidden"></div></body></html>
