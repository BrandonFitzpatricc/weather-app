<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
  </head>

  <body>
    <div class="main-content">
      <button class="open-sidebar-btn">
        <img class="icon" src="./icons/input-icons/open-sidebar.svg" alt="menu selection icon" width="65" height="65">
      </button>

      <div class="header">
        <div class="temp current">80°</div>
        <div class="location-name">New York, New York</div>
        <div class="temp-info">
          <div class="temp feel-like">Feels like 81°</div>
          <div class="temp high">High 80°</div>
          <div class="temp low">Low 55°</div>
        </div>
        <img
          class="icon weather"
          src="./icons/weather-icons/partly-cloudy-day.svg"
          alt="partly cloudy weather icon"
          width="300"
          height="300"
        />
      </div>

      <div class="weather-info-hourly"></div>

      <div class="weather-info-daily"></div>
    </div>
  </body>
</html>
